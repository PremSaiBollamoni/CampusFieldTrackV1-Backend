spring:
  application:
    name: campusfieldtrack-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/campusfieldtrack?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 100
          fetch_size: 50
    show-sql: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your-super-secret-jwt-key-change-this-in-production-at-least-32-characters-long
  expiration: 86400000

logging:
  level:
    root: INFO
    com.campusfieldtrack: DEBUG
