version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: campusfieldtrack-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:PremSai}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - campusfieldtrack-network

  backend:
    build: .
    container_name: campusfieldtrack-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/CampusTrack?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      DB_USER: ${DB_USER:root}
      DB_PASS: ${DB_PASS:PremSai}
      JWT_SECRET: ${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production-at-least-32-characters-long}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - campusfieldtrack-network

volumes:
  mysql_data:

networks:
  campusfieldtrack-network:
    driver: bridge
